# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  

jobs:
  build:

    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - name: Free up disk space
      run: |
        echo "Checking disk space before cleanup..."
        df -h
        echo "Cleaning up old files..."
        sudo apt-get clean
        sudo apt-get autoclean
        echo "Disk space after cleanup..."
        df -h
        
    - name: Backup .env
      run: |
          if [ -f .env ]; then mv .env /tmp/env_backup; fi
          
    - uses: actions/checkout@v4
    
    - name: Restore .env
      run: |
          if [ -f /tmp/env_backup ]; then mv /tmp/env_backup .env; fi
          
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
    - run: |
          if sudo pm2 list | grep -q backend; then
            sudo pm2 restart backend
          else
            sudo pm2 start backend --name backend
          fi

